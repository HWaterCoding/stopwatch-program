<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock Application</title>
    <script src="https://kit.fontawesome.com/00250d9010.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="navbar">
        <button id="stopwatchNavbarBtn">Stop-Watch</button>
        <button id="clockNavbarBtn">World Clock</button>
        <button id="timerNavbarBtn">Timer</button>
        <button id="alarmNavbarBtn">Alarm</button>
    </div>


    <div id="content">
        <div id="timerWrapper">
            <h1>Timer</h1>
            <div id="defaultMessageDiv">
                <i class="fa-solid fa-stopwatch"></i>
                <h3>You don't have any timers set up yet.</h3>
                <h4>Click + to add a timer.</h4>
                <h4>Click <i class="fa-solid fa-trash-can"></i> to delete a timer.</h4>
                <div id="timerButtonContainer">
                    <button id="addTimerBtn"><i class="fa-solid fa-plus"></i></button>
                    <button id="deleteTimerBtn"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
